name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r python/requirements.txt

      - name: Test hello_world
        run: |
          timeout 15 python python/hello_world/server.py &
          SERVER_PID=$!
          sleep 2
          python python/hello_world/client.py
          CLIENT_EXIT=$?
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          exit $CLIENT_EXIT

      - name: Test method_calls
        run: |
          timeout 15 python python/method_calls/server.py &
          SERVER_PID=$!
          sleep 2
          python python/method_calls/client.py
          CLIENT_EXIT=$?
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          exit $CLIENT_EXIT

      - name: Test complex_types
        run: |
          timeout 15 python python/complex_types/server.py &
          SERVER_PID=$!
          sleep 2
          python python/complex_types/client.py
          CLIENT_EXIT=$?
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          exit $CLIENT_EXIT

      - name: Test large_messages
        run: |
          timeout 15 python python/large_messages/server.py &
          SERVER_PID=$!
          sleep 2
          python python/large_messages/client.py
          CLIENT_EXIT=$?
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          exit $CLIENT_EXIT

      - name: Test e2e_protection
        run: python python/e2e_protection/basic_e2e.py

      - name: Test events
        run: |
          timeout 15 python python/events/publisher.py &
          PUB_PID=$!
          sleep 2
          timeout 10 python python/events/subscriber.py &
          SUB_PID=$!
          sleep 5
          kill $SUB_PID 2>/dev/null || true
          kill $PUB_PID 2>/dev/null || true
          wait $SUB_PID 2>/dev/null || true
          wait $PUB_PID 2>/dev/null || true

      - name: Test sd_demo
        run: |
          timeout 5 python python/sd_demo/server.py || true

  cpp:
    name: C++ (${{ matrix.preset }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: host-linux
          - os: macos-latest
            preset: host-macos
          - os: windows-latest
            preset: host-windows
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake git

      - name: Cache CMake FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: cpp/build/${{ matrix.preset }}/_deps
          key: cmake-deps-${{ matrix.preset }}-${{ hashFiles('cpp/CMakeLists.txt') }}

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}
        working-directory: cpp

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} --config Release
        working-directory: cpp

      # ------------------------------------------------------------------
      # Integration tests (Linux and macOS only -- require POSIX shell)
      # ------------------------------------------------------------------
      - name: Test hello_world
        if: runner.os != 'Windows'
        timeout-minutes: 1
        run: |
          ./cpp/build/${{ matrix.preset }}/bin/hello_world_server &
          SERVER_PID=$!
          sleep 2
          ./cpp/build/${{ matrix.preset }}/bin/hello_world_client
          CLIENT_EXIT=$?
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          exit $CLIENT_EXIT

      - name: Test method_calls
        if: runner.os != 'Windows'
        timeout-minutes: 1
        run: |
          ./cpp/build/${{ matrix.preset }}/bin/method_calls_server &
          SERVER_PID=$!
          sleep 2
          ./cpp/build/${{ matrix.preset }}/bin/method_calls_client
          CLIENT_EXIT=$?
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          exit $CLIENT_EXIT

      - name: Test complex_types
        if: runner.os != 'Windows'
        timeout-minutes: 1
        run: |
          ./cpp/build/${{ matrix.preset }}/bin/complex_types_server &
          SERVER_PID=$!
          sleep 2
          ./cpp/build/${{ matrix.preset }}/bin/complex_types_client
          CLIENT_EXIT=$?
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          exit $CLIENT_EXIT

      - name: Test large_messages
        if: runner.os != 'Windows'
        timeout-minutes: 1
        run: |
          ./cpp/build/${{ matrix.preset }}/bin/large_messages_server &
          SERVER_PID=$!
          sleep 2
          ./cpp/build/${{ matrix.preset }}/bin/large_messages_client
          CLIENT_EXIT=$?
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          exit $CLIENT_EXIT

      - name: Test e2e_protection
        if: runner.os != 'Windows'
        timeout-minutes: 1
        run: ./cpp/build/${{ matrix.preset }}/bin/basic_e2e

      - name: Test events
        if: runner.os != 'Windows'
        timeout-minutes: 1
        run: |
          ./cpp/build/${{ matrix.preset }}/bin/events_publisher &
          PUB_PID=$!
          sleep 2
          ./cpp/build/${{ matrix.preset }}/bin/events_subscriber &
          SUB_PID=$!
          sleep 5
          kill $SUB_PID 2>/dev/null || true
          kill $PUB_PID 2>/dev/null || true
          wait $SUB_PID 2>/dev/null || true
          wait $PUB_PID 2>/dev/null || true

      - name: Test sd_demo
        if: runner.os != 'Windows'
        timeout-minutes: 1
        run: |
          ./cpp/build/${{ matrix.preset }}/bin/sd_demo_server &
          SERVER_PID=$!
          sleep 5
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true

      - name: Upload C++ binaries
        if: matrix.preset == 'host-linux'
        uses: actions/upload-artifact@v4
        with:
          name: cpp-binaries
          path: cpp/build/host-linux/bin/

  zephyr:
    name: Zephyr (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: native_sim
            apps: "e2e_protection hello_world_server hello_world_client"
            run_tests: true
          - target: s32k388_renode
            apps: "e2e_protection hello_world_server"
            run_tests: false
    env:
      ZEPHYR_SDK_VERSION: "0.17.0"
      OPENSOMEIP_COMMIT: "v0.1.0"
    steps:
      - uses: actions/checkout@v4

      - name: Install Zephyr dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git cmake ninja-build gperf \
            ccache dfu-util device-tree-compiler wget \
            python3-dev python3-pip python3-setuptools python3-tk \
            python3-wheel xz-utils file make gcc gcc-multilib \
            g++-multilib libsdl2-dev libmagic1
          pip3 install west

      - name: Initialize Zephyr workspace
        run: |
          west init ~/zephyrproject
          cd ~/zephyrproject
          west update --narrow -o=--depth=1
          west zephyr-export
          pip3 install -r ~/zephyrproject/zephyr/scripts/requirements.txt

      - name: Install Zephyr SDK
        run: |
          cd /tmp
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${ZEPHYR_SDK_VERSION}/zephyr-sdk-${ZEPHYR_SDK_VERSION}_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-${ZEPHYR_SDK_VERSION}_linux-x86_64_minimal.tar.xz -C ~/
          ~/zephyr-sdk-${ZEPHYR_SDK_VERSION}/setup.sh -h -c
          # Install host and ARM toolchains
          cd ~/zephyr-sdk-${ZEPHYR_SDK_VERSION}
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${ZEPHYR_SDK_VERSION}/toolchain_linux-x86_64_x86_64-zephyr-elf.tar.xz
          tar xf toolchain_linux-x86_64_x86_64-zephyr-elf.tar.xz
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${ZEPHYR_SDK_VERSION}/toolchain_linux-x86_64_arm-zephyr-eabi.tar.xz
          tar xf toolchain_linux-x86_64_arm-zephyr-eabi.tar.xz

      - name: Clone opensomeip
        run: |
          git clone https://github.com/vtz/opensomeip.git ~/opensomeip
          cd ~/opensomeip
          git checkout $OPENSOMEIP_COMMIT

      - name: Build examples
        env:
          ZEPHYR_BASE: ~/zephyrproject/zephyr
          ZEPHYR_TOOLCHAIN_VARIANT: zephyr
          ZEPHYR_SDK_INSTALL_DIR: ~/zephyr-sdk-0.17.0
        run: |
          cd ~/zephyrproject
          OPENSOMEIP_ROOT="$HOME/opensomeip"
          BOARD="${{ matrix.target }}"
          for app in ${{ matrix.apps }}; do
            echo "=== Building $app for $BOARD ==="
            EXTRA_ARGS=""
            if [ "$BOARD" = "s32k388_renode" ]; then
              EXTRA_ARGS="-DBOARD_ROOT=$OPENSOMEIP_ROOT/zephyr"
            fi
            west build -b "$BOARD" "$GITHUB_WORKSPACE/zephyr/$app" \
              -d "$GITHUB_WORKSPACE/build/zephyr/${BOARD}_${app}" \
              --pristine auto -- \
              -DOPENSOMEIP_ROOT="$OPENSOMEIP_ROOT" $EXTRA_ARGS
          done

      - name: Run native_sim tests
        if: matrix.run_tests
        env:
          ZEPHYR_BASE: ~/zephyrproject/zephyr
        run: |
          echo "=== Running e2e_protection ==="
          timeout 30 $GITHUB_WORKSPACE/build/zephyr/native_sim_e2e_protection/zephyr/zephyr.exe

  combined:
    name: Cross-Language Tests
    runs-on: ubuntu-latest
    needs: [cpp, python]
    steps:
      - uses: actions/checkout@v4

      - name: Download C++ binaries
        uses: actions/download-artifact@v4
        with:
          name: cpp-binaries
          path: cpp/build/host-linux/bin/

      - name: Make binaries executable
        run: chmod +x cpp/build/host-linux/bin/*

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r python/requirements.txt

      - name: "hello_world: Python server + C++ client"
        run: |
          timeout 15 python python/hello_world/server.py &
          SERVER_PID=$!
          sleep 2
          ./cpp/build/host-linux/bin/hello_world_client
          CLIENT_EXIT=$?
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          exit $CLIENT_EXIT

      - name: "hello_world: C++ server + Python client"
        run: |
          timeout 15 ./cpp/build/host-linux/bin/hello_world_server &
          SERVER_PID=$!
          sleep 2
          python python/hello_world/client.py
          CLIENT_EXIT=$?
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          exit $CLIENT_EXIT

      - name: "method_calls: Python server + C++ client"
        run: |
          timeout 15 python python/method_calls/server.py &
          SERVER_PID=$!
          sleep 2
          ./cpp/build/host-linux/bin/method_calls_client
          CLIENT_EXIT=$?
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          exit $CLIENT_EXIT

      - name: "method_calls: C++ server + Python client"
        run: |
          timeout 15 ./cpp/build/host-linux/bin/method_calls_server &
          SERVER_PID=$!
          sleep 2
          python python/method_calls/client.py
          CLIENT_EXIT=$?
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          exit $CLIENT_EXIT
